<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E5E5E4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#F9F9F8"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left content -->
  <g transform="translate(80, 110)">
    <text font-family="Manrope, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#C63A2F">FOR ESL TEACHERS IN VIETNAM</text>
    <text y="120" font-family="Georgia, 'Cormorant Garamond', serif" font-size="120" font-weight="500" fill="#1A1A1A">Plan less.</text>
    <text y="240" font-family="Georgia, 'Cormorant Garamond', serif" font-size="120" font-weight="500" fill="#1A1A1A">Teach more.</text>

    <text y="320" font-family="Manrope, system-ui, sans-serif" font-size="28" fill="#5A5A5A">Cambridge &amp; CEFR-aligned ESL worksheets,</text>
    <text y="358" font-family="Manrope, system-ui, sans-serif" font-size="28" fill="#5A5A5A">generated in seconds. Kindergarten → IELTS.</text>

    <!-- Stats row -->
    <g transform="translate(0, 420)">
      <text font-family="Georgia, serif" font-size="56" font-weight="500" fill="#C63A2F">A1 → C2</text>
      <text y="28" x="0" font-family="Manrope, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#5A5A5A">CEFR</text>
    </g>
    <g transform="translate(280, 420)">
      <text font-family="Georgia, serif" font-size="56" font-weight="500" fill="#C63A2F">3 pages</text>
      <text y="28" x="0" font-family="Manrope, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#5A5A5A">PER WORKSHEET</text>
    </g>
    <g transform="translate(560, 420)">
      <text font-family="Georgia, serif" font-size="56" font-weight="500" fill="#C63A2F">£5</text>
      <text y="28" x="0" font-family="Manrope, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#5A5A5A">UNLIMITED / MONTH</text>
    </g>
  </g>

  <!-- Right brand stack -->
  <g transform="translate(870, 110)">
    <rect x="0" y="0" width="240" height="320" fill="#FFFFFF" stroke="#E5E5E4" stroke-width="2"/>
    <rect x="14" y="14" width="212" height="40" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="120" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="500" fill="#1A1A1A">Tet at Grandma's House</text>
    <text x="120" y="78" text-anchor="middle" font-family="Manrope, sans-serif" font-size="11" letter-spacing="2" fill="#5A5A5A">CEFR · A2 · PRIMARY</text>
    <line x1="20" y1="100" x2="220" y2="100" stroke="#1A1A1A" stroke-width="1.5"/>
    <line x1="20" y1="120" x2="220" y2="120" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="138" x2="220" y2="138" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="156" x2="200" y2="156" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="174" x2="220" y2="174" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="192" x2="180" y2="192" stroke="#E5E5E4" stroke-width="1"/>

    <text x="20" y="230" font-family="Manrope, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#C63A2F">SECTION 2</text>
    <line x1="20" y1="248" x2="220" y2="248" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="266" x2="200" y2="266" stroke="#E5E5E4" stroke-width="1"/>
    <line x1="20" y1="284" x2="220" y2="284" stroke="#E5E5E4" stroke-width="1"/>

    <text x="120" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3" fill="#999999">SmartGiaoAn · Page 1</text>
  </g>

  <!-- Footer brand -->
  <g transform="translate(80, 560)">
    <text font-family="Georgia, serif" font-size="32" font-weight="500" fill="#1A1A1A">SmartGiao<tspan fill="#C63A2F">An</tspan></text>
    <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="3" fill="#5A5A5A">www.smartgiaoan.site</text>
